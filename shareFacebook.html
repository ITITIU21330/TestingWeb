    <title>Chia sẻ Facebook</title>
    <style>
        .share-facebook {
            background-color: #3b5998;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .share-facebook:hover {
            background-color: #2d4373;
        }
    </style>
</head>
<body>
    <button class="share-facebook" onclick="shareOnFacebook()">Chia sẻ lên Facebook</button>

    <script>
        function shareOnFacebook() {
            const shareUrl = 'https://www.facebook.com/sharer/sharer.php?u=https://ititiu21330.github.io/TestingWeb/score.html';
            window.open(shareUrl, '_blank', 'width=600,height=400');
        }
    </script>
</body>
