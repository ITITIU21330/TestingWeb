<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Khảo sát" />
    <meta property="og:description" content="Kết quả khảo sát" />
    <meta property="og:url" content="https://ititiu21330.github.io/TestingWeb/score.html" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://ititiu21330.github.io/TestingWeb/images/images-web.png">
    <title>Chia sẻ Facebook</title>
    <style>
        .share-facebook {
            background-color: #3b5998;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <img src="https://ititiu21330.github.io/TestingWeb/images/fixed-image.jpg" alt="Kết quả khảo sát" style="max-width: 100%; height: auto;" />
    <button class="share-facebook" onclick="shareOnFacebook()">Chia sẻ lên Facebook</button>

    <script>
        function shareOnFacebook() {
            const currentUrl = window.location.href;
            const shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentUrl)}`;
            window.open(shareUrl, '_blank', 'width=600,height=400');
        }
    </script>
</body>
</html>
