<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Khảo sát" />
    <meta property="og:description" content="Số điểm đạt được từ khảo sát" />
    <meta property="og:url" content="https://ititiu21330.github.io/TestingWeb/score.html" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="" id="og-image">
    <title>Chia sẻ Facebook</title>
    <style>
        .share-facebook {
            background-color: #3b5998;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .share-facebook:hover {
            background-color: #2d4373;
        }
    </style>
</head>
<body>
    <p id="score"></p>
    <img id="result-image" alt="Kết quả điểm" style="max-width: 100%; height: auto;" />
    <button class="share-facebook" onclick="shareOnFacebook()">Chia sẻ lên Facebook</button>

    <script>
        const score = parseFloat(localStorage.getItem('score')) || 0;
        let resultImage = '';
        let ogImage = '';
        
        switch (true) {
            case (score == 0):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-0.jpg';
                ogImage = resultImage;
                break;
            case (score == 0.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-0.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 1):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-1.jpg';
                ogImage = resultImage;
                break;
            case (score == 1.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-1.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 2):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-2.jpg';
                ogImage = resultImage;
                break;
            case (score == 2.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/score-2.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 3):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-3.jpg';
                ogImage = resultImage;
                break;
            case (score == 3.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-3.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 4):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-4.jpg';
                ogImage = resultImage;
                break;
            case (score == 4.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-4.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-5.jpg';
                ogImage = resultImage;
                break;
            case (score == 5.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-5.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 6):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-6.jpg';
                ogImage = resultImage;
                break;
            case (score == 6.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-6.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 7):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-7.jpg';
                ogImage = resultImage;
                break;
            case (score == 7.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-7.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 8):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-8.jpg';
                ogImage = resultImage;
                break;
            case (score == 8.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-8.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 9):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-9.jpg';
                ogImage = resultImage;
                break;
            case (score == 9.5):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-9.5.jpg';
                ogImage = resultImage;
                break;
            case (score == 10):
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/score-10.jpg';
                ogImage = resultImage;
                break;
            default:
                resultImage = 'https://ititiu21330.github.io/TestingWeb/images/default.jpg';
                ogImage = resultImage;
                break;
        }
        
        document.getElementById('result-image').src = resultImage;
        document.getElementById('score').textContent = `Điểm của bạn: ${score}`;
        document.getElementById('og-image').setAttribute('content', ogImage);

        function shareOnFacebook() {
            const shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://ititiu21330.github.io/TestingWeb/score.html')}`;
            window.open(shareUrl, '_blank', 'width=600,height=400');
        }
    </script>
</body>
</html>
