<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Khảo sát" />
    <meta property="og:description" content="Số điểm đạt được từ khảo sát" />
    <meta property="og:url" content="https://ititiu21330.github.io/TestingWeb/score.html" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="" id="og-image">
    <title>Chia sẻ Facebook</title>
    <style>
        .share-facebook {
            background-color: #3b5998;
            color: white;
            font-size: 16px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .share-facebook:hover {
            background-color: #2d4373;
        }
    </style>
</head>
<body>
    <p id="score"></p>
    <img id="result-image" alt="Kết quả điểm" style="max-width: 100%; height: auto;" />
    <button class="share-facebook" onclick="shareOnFacebook()">Chia sẻ lên Facebook</button>

    <script>
        const score = parseFloat(localStorage.getItem('score')) || 0;
        const imageMap = {
            0: 'score-0.jpg', 0.5: 'score-0.5.jpg', 1: 'score-1.jpg', 1.5: 'score-1.5.jpg',
            2: 'score-2.jpg', 2.5: 'score-2.5.jpg', 3: 'score-3.jpg', 3.5: 'score-3.5.jpg',
            4: 'score-4.jpg', 4.5: 'score-4.5.jpg', 5: 'score-5.jpg', 5.5: 'score-5.5.jpg',
            6: 'score-6.jpg', 6.5: 'score-6.5.jpg', 7: 'score-7.jpg', 7.5: 'score-7.5.jpg',
            8: 'score-8.jpg', 8.5: 'score-8.5.jpg', 9: 'score-9.jpg', 9.5: 'score-9.5.jpg',
            10: 'score-10.jpg'
        };

        const baseUrl = 'https://ititiu21330.github.io/TestingWeb/images/';
        const resultImage = baseUrl + (imageMap[score] || 'default.jpg');

        document.getElementById('result-image').src = resultImage;
        document.getElementById('score').textContent = `Điểm của bạn: ${score}`;
        document.getElementById('og-image').setAttribute('content', resultImage);

        function shareOnFacebook() {
            const currentUrl = window.location.href;
            const shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(currentUrl)}`;
            window.open(shareUrl, '_blank', 'width=600,height=400');
        }
    </script>
</body>
</html>
